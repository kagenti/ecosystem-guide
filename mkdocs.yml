site_name: Kagenti Ecosystem Guide
site_url: https://pages.github.ibm.com/Jenna-Winkler/ecosystem-guide/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: default
      primary: white
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Red Hat Text
    code: Red Hat Mono
  features:
    - navigation.instant
    - navigation.sections
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - tables
  - toc:
      permalink: true

docs_dir: content
site_dir: docs

nav:
  - Overview:
    - Welcome: README.md
    - About Kagenti: about.md
    - Use Cases & Personas: use-cases.md
  - Planning:
    - Key Dates: key-dates.md
    - Goals & OKRs: goals.md
  - Project:
    - Workstreams: workstreams/README.md
  - Community:
    - Onboarding: onboarding.md
    - Content: content.md
    - Resources: resources.md
